<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sky background -->
  <rect width="32" height="32" rx="6" fill="#1a1a2e"/>
  <!-- Taj Mahal dome -->
  <ellipse cx="16" cy="13" rx="5" ry="6" fill="#e8e0d0"/>
  <!-- Finial -->
  <line x1="16" y1="7" x2="16" y2="4" stroke="#e8e0d0" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="16" cy="3.5" r="1" fill="#c9a84c"/>
  <!-- Main archway -->
  <rect x="13" y="13" width="6" height="7" rx="1" fill="#1a1a2e"/>
  <path d="M13 16 Q16 13 19 16" fill="#1a1a2e"/>
  <!-- Plinth -->
  <rect x="9" y="20" width="14" height="3" rx="1" fill="#c9a84c"/>
  <!-- Left minaret -->
  <rect x="8" y="13" width="2.5" height="8" rx="1" fill="#e8e0d0"/>
  <ellipse cx="9.25" cy="12.5" rx="1.5" ry="2" fill="#e8e0d0"/>
  <!-- Right minaret -->
  <rect x="21.5" y="13" width="2.5" height="8" rx="1" fill="#e8e0d0"/>
  <ellipse cx="22.75" cy="12.5" rx="1.5" ry="2" fill="#e8e0d0"/>
  <!-- Reflecting pool -->
  <rect x="12" y="24" width="8" height="2" rx="1" fill="#2d4a6b" opacity="0.8"/>
  <rect x="14" y="24.5" width="4" height="1" rx="0.5" fill="#4a90d9" opacity="0.5"/>
</svg>
